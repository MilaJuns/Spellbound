<!-- @dsCard group="Type" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="card.css">
<style>
  .card{ display:flex; flex-direction:column; justify-content:center; }
  .scriptbig { font-family:var(--font-script); font-style:italic; font-weight:500; color:var(--cream-200); line-height:1; font-size:54px; }
  .meta { display:flex; gap:18px; margin-top:16px; align-items:baseline; }
  .meta .name { font-family:var(--font-display); font-size:14px; letter-spacing:.05em; text-transform:uppercase; color:var(--orange-400); }
  .meta .use { font-size:12px; color:var(--cream-400); }
</style></head>
<body><div class="card">
  <div class="scriptbig">Strategy that captivates</div>
  <div class="meta"><span class="name">Cormorant Garamond · Italic</span><span class="use">Tagline / pull-quote accent — used in italic, sparingly</span></div>
</div></body></html>
