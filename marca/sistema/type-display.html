<!-- @dsCard group="Type" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="card.css">
<style>
  .card{ display:flex; flex-direction:column; justify-content:center; }
  .big { font-family:var(--font-display); font-weight:700; color:var(--cream-200); letter-spacing:.005em; line-height:1; font-size:54px; }
  .meta { display:flex; gap:18px; margin-top:14px; align-items:baseline; }
  .meta .name { font-family:var(--font-display); font-size:14px; letter-spacing:.05em; text-transform:uppercase; color:var(--orange-400); }
  .meta .use { font-size:12px; color:var(--cream-400); }
  .glyphs { font-family:var(--font-display); color:var(--cream-300); font-size:22px; letter-spacing:.06em; margin-top:10px; }
</style></head>
<body><div class="card">
  <div class="big">Aa Bb Gg</div>
  <div class="glyphs">ABCDEFGHIJKLM · 0123456789</div>
  <div class="meta"><span class="name">Varela Round</span><span class="use">Display · headings · UI wordmark — the shared family face (with Mila Juns)</span></div>
  <div class="glyphs" style="font-size:13px;color:var(--cream-400);margin-top:12px">Geometry Soft Pro is reserved for the locked Spelbound logo lockup only.</div>
</div></body></html>
