<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="card.css">
<style>
  .swatches { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); }
  .sw .chip { height: 64px; }
  .sw { border: 1px solid var(--amber-tint); }
  .sw .meta { padding: 8px 10px; background: var(--maroon-900); }
  .sw .name { font-size: 12px; font-weight: 700; color: var(--cream-100); }
  .sw .hex { font-family: "JetBrains Mono", monospace; font-size: 10.5px; color: var(--cream-400); margin-top: 2px; }
</style></head>
<body><div class="card">
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:#1A0000"></div><div class="meta"><div class="name">maroon-950</div><div class="hex">#1A0000</div></div></div>
    <div class="sw"><div class="chip" style="background:#3A0000"></div><div class="meta"><div class="name">maroon-900 ·card</div><div class="hex">#3A0000</div></div></div>
    <div class="sw"><div class="chip" style="background:#510000"></div><div class="meta"><div class="name">maroon-800 ·base</div><div class="hex">#510000</div></div></div>
    <div class="sw"><div class="chip" style="background:#720000"></div><div class="meta"><div class="name">maroon-700</div><div class="hex">#720000</div></div></div>
    <div class="sw"><div class="chip" style="background:#990000"></div><div class="meta"><div class="name">maroon-600 ·cta</div><div class="hex">#990000</div></div></div>
  </div>
</div></body></html>
