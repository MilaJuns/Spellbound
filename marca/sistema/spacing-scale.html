<!-- @dsCard group="Spacing" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="card.css">
<style>
  .scale { display:flex; flex-direction:column; gap:7px; }
  .r { display:flex; align-items:center; gap:14px; }
  .r .tok { font-family:"JetBrains Mono",monospace; font-size:10.5px; color:var(--cream-400); width:118px; flex:none; }
  .bar { height:14px; background:var(--orange-500); border-radius:3px; }
</style></head>
<body><div class="card">
  <div class="scale">
    <div class="r"><span class="tok">space-1 · 4</span><div class="bar" style="width:4px"></div></div>
    <div class="r"><span class="tok">space-2 · 8</span><div class="bar" style="width:8px"></div></div>
    <div class="r"><span class="tok">space-3 · 12</span><div class="bar" style="width:12px"></div></div>
    <div class="r"><span class="tok">space-4 · 16</span><div class="bar" style="width:16px"></div></div>
    <div class="r"><span class="tok">space-5 · 24</span><div class="bar" style="width:24px"></div></div>
    <div class="r"><span class="tok">space-6 · 32</span><div class="bar" style="width:32px"></div></div>
    <div class="r"><span class="tok">space-7 · 48</span><div class="bar" style="width:48px"></div></div>
    <div class="r"><span class="tok">space-8 · 64</span><div class="bar" style="width:64px"></div></div>
  </div>
</div></body></html>
