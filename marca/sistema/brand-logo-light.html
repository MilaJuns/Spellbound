<!-- @dsCard group="Brand" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="card.css">
<style>
  .card{ display:flex; align-items:center; justify-content:space-around; background:var(--cream-100); }
  .lock { display:flex; flex-direction:column; align-items:center; gap:3px; }
  .crown { width:120px; color:var(--orange-500); margin-bottom:9px; }
  .wm { font-family:var(--font-logo); font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--ink-900); font-size:23px; line-height:1; white-space:nowrap; }
  .tg { font-family:var(--font-script); font-style:italic; font-weight:500; color:var(--maroon-800); font-size:20px; }
  .markbox { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .markbox .big { width:64px; height:64px; color:var(--orange-500); }
  .markbox .lbl3 { font-size:11px; color:var(--ink-700); }
</style></head>
<body><div class="card card--cream">
  <div class="lock">
    <svg class="crown" viewBox="0 0 240 60" fill="currentColor"><circle cx="30" cy="30" r="5"/><circle cx="68" cy="30" r="8.5"/><path d="M120 4 L128 22 L146 30 L128 38 L120 56 L112 38 L94 30 L112 22 Z"/><circle cx="172" cy="30" r="8.5"/><circle cx="210" cy="30" r="5"/></svg>
    <div class="wm">Spelbound Marketing</div>
    <div class="tg">Strategy that captivates</div>
  </div>
  <div class="markbox">
    <svg class="big" viewBox="0 0 100 100" fill="currentColor"><path d="M50 2 L58 42 L98 50 L58 58 L50 98 L42 58 L2 50 L42 42 Z"/></svg>
    <div class="lbl3">Sparkle mark &amp; crown</div>
  </div>
</div></body></html>
