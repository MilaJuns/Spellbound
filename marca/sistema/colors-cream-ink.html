<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="card.css">
<style>
  .swatches { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--cream-400); }
  .sw .chip { height: 60px; }
  .sw .meta { padding: 7px 9px; background: #fff; }
  .sw .name { font-size: 11px; font-weight: 600; color: var(--ink-900); }
  .sw .hex { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--ink-700); margin-top: 2px; }
</style></head>
<body><div class="card card--cream">
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="meta"><div class="name">cream-50</div><div class="hex">#FFFFFF</div></div></div>
    <div class="sw"><div class="chip" style="background:#F5EDE0"></div><div class="meta"><div class="name">cream-100 ·base</div><div class="hex">#F5EDE0</div></div></div>
    <div class="sw"><div class="chip" style="background:#EFE5D4"></div><div class="meta"><div class="name">cream-200</div><div class="hex">#EFE5D4</div></div></div>
    <div class="sw"><div class="chip" style="background:#E2D5BE"></div><div class="meta"><div class="name">cream-border</div><div class="hex">#E2D5BE</div></div></div>
    <div class="sw"><div class="chip" style="background:#5A3232"></div><div class="meta"><div class="name">ink-700</div><div class="hex">#5A3232</div></div></div>
    <div class="sw"><div class="chip" style="background:#2A0B0B"></div><div class="meta"><div class="name">ink-900</div><div class="hex">#2A0B0B</div></div></div>
  </div>
</div></body></html>
