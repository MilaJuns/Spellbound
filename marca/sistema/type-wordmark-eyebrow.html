<!-- @dsCard group="Type" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="card.css">
<style>
  .card{ display:flex; flex-direction:column; gap:18px; justify-content:center; }
  .eyebrow { font-family:var(--font-body); font-weight:600; font-size:13px; letter-spacing:.22em; text-transform:uppercase; color:var(--orange-500); }
  .wordmark { font-family:var(--font-display); font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--cream-200); font-size:30px; }
  .note { font-size:11.5px; color:var(--cream-400); margin-top:-10px; }
</style></head>
<body><div class="card">
  <div>
    <div class="eyebrow">Strategy · Brand · Campaigns</div>
    <div class="note" style="margin-top:6px">.eyebrow — 0.22em tracking, uppercase, orange</div>
  </div>
  <div>
    <div class="wordmark">Spelbound Marketing</div>
    <div class="note" style="margin-top:6px">.wordmark — 0.06em tracking, uppercase, Geometry Soft Pro</div>
  </div>
</div></body></html>
