<!-- @dsCard group="Type" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="card.css">
<style>
  .card{ display:flex; flex-direction:column; justify-content:center; }
  .lead { font-family:var(--font-body); font-weight:400; font-size:19px; color:var(--cream-200); line-height:1.45; max-width:560px; }
  .body { font-family:var(--font-body); font-weight:400; font-size:14px; color:var(--cream-300); line-height:1.6; max-width:560px; margin-top:8px; }
  .weights { display:flex; gap:16px; margin-top:14px; }
  .weights span { font-family:var(--font-body); color:var(--cream-200); font-size:15px; }
  .meta { margin-top:14px; }
  .meta .name { font-family:var(--font-display); font-size:14px; letter-spacing:.05em; text-transform:uppercase; color:var(--orange-400); }
</style></head>
<body><div class="card">
  <div class="lead">We turn scattered effort into a clear, founded strategy.</div>
  <div class="body">Warm, plain and confident — Nunito carries every paragraph, label, caption and interface control across the system.</div>
  <div class="weights"><span style="font-weight:300">Light</span><span style="font-weight:400">Regular</span><span style="font-weight:600">Semibold</span><span style="font-weight:700">Bold</span><span style="font-weight:800">Extra</span></div>
  <div class="meta"><span class="name">Nunito · 300 / 400 / 600 / 700 / 800</span></div>
</div></body></html>
