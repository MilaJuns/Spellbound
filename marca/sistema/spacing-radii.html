<!-- @dsCard group="Spacing" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="card.css">
<style>
  .grid { display:flex; gap:16px; align-items:flex-end; }
  .item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { width:78px; height:78px; background:var(--maroon-900); border:1.5px solid var(--orange-500); }
  .lbl2 { font-size:11px; color:var(--cream-300); font-weight:600; }
  .tok { font-family:"JetBrains Mono",monospace; font-size:10px; color:var(--cream-400); }
</style></head>
<body><div class="card">
  <div class="grid">
    <div class="item"><div class="box" style="border-radius:6px"></div><div class="lbl2">sm</div><div class="tok">6px</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="lbl2">md ·card</div><div class="tok">8px</div></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><div class="lbl2">lg</div><div class="tok">12px</div></div>
    <div class="item"><div class="box" style="border-radius:18px"></div><div class="lbl2">xl</div><div class="tok">18px</div></div>
    <div class="item"><div class="box" style="border-radius:999px"></div><div class="lbl2">pill</div><div class="tok">999px</div></div>
  </div>
</div></body></html>
