<!-- @dsCard group="Brand" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="card.css">
<style>
  .card { display:flex; flex-direction:column; gap:12px; }
  .row2 { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .ph { position:relative; border-radius:var(--radius-md); overflow:hidden; aspect-ratio:1/1.15; border:1px solid var(--amber-tint); }
  .ph img { width:100%; height:100%; object-fit:cover; display:block; }
  .ph .ov { position:absolute; inset:0; background:linear-gradient(to top, rgba(81,0,0,.4), transparent 55%); }
  .note { font-family:var(--font-body); font-size:12px; color:var(--cream-300); line-height:1.5; }
  .note b { color:var(--orange-400); font-weight:700; }
</style></head>
<body><div class="card">
  <div class="row2">
    <div class="ph"><img src="../assets/photos/founder-portrait.jpeg" alt=""><div class="ov"></div></div>
    <div class="ph"><img src="../assets/photos/founder-mic.jpeg" alt=""><div class="ov"></div></div>
    <div class="ph"><img src="../assets/photos/founder-desk.jpeg" alt=""><div class="ov"></div></div>
    <div class="ph"><img src="../assets/photos/founder-headshot.jpeg" alt=""><div class="ov"></div></div>
  </div>
  <div class="note">Real, warm portraits in <b>Northern / Dutch light</b> — maroon, green &amp; black wardrobe sits in-palette. Apply a subtle <b>maroon top-fade</b> overlay so cream text stays legible.</div>
</div></body></html>
