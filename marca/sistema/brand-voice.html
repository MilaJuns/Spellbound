<!-- @dsCard group="Brand" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="card.css">
<style>
  .card { display:flex; gap:26px; }
  .left { flex:1.1; }
  .ess { font-family:var(--font-display); font-weight:700; font-size:21px; color:var(--cream-100); margin:6px 0 6px; }
  .desc { font-family:var(--font-body); font-size:13px; line-height:1.5; color:var(--cream-300); }
  .right { flex:1; border-left:1px solid var(--amber-tint); padding-left:24px; }
  .sub { display:grid; grid-template-columns:auto auto 1fr; gap:6px 8px; align-items:baseline; font-family:var(--font-body); font-size:12.5px; }
  .av { color:var(--cream-400); text-decoration:line-through; }
  .ar { color:var(--amber-500); }
  .to { color:var(--cream-100); font-weight:700; }
</style></head>
<body><div class="card">
  <div class="left">
    <div class="eyebrow">Voice · Sábio Parceiro</div>
    <div class="ess">The Wise Partner</div>
    <div class="desc">Authority with closeness. Teaches without arrogance, simplifies the complex, points to the next step. Serene, confident — <b style="color:var(--cream-100)">never magic promises.</b></div>
  </div>
  <div class="right">
    <div class="caption" style="margin-bottom:10px">Word substitutions</div>
    <div class="sub">
      <span class="av">problem</span><span class="ar">→</span><span class="to">challenge</span>
      <span class="av">easy</span><span class="ar">→</span><span class="to">practical</span>
      <span class="av">cheap</span><span class="ar">→</span><span class="to">accessible</span>
      <span class="av">guaranteed</span><span class="ar">→</span><span class="to">proven</span>
      <span class="av">miracle</span><span class="ar">→</span><span class="to">founded strategy</span>
    </div>
  </div>
</div></body></html>
