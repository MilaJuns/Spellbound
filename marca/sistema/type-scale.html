<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="card.css">
<style>
  .scale { display:flex; flex-direction:column; gap:2px; }
  .r { display:flex; align-items:baseline; gap:16px; }
  .r .tok { font-family:"JetBrains Mono",monospace; font-size:10.5px; color:var(--cream-400); width:96px; flex:none; }
  .r .ex { font-family:var(--font-display); font-weight:700; color:var(--cream-200); line-height:1.1; white-space:nowrap; }
</style></head>
<body><div class="card">
  <div class="scale">
    <div class="r"><span class="tok">5xl · 88</span><span class="ex" style="font-size:44px">Captivate</span></div>
    <div class="r"><span class="tok">3xl · 48</span><span class="ex" style="font-size:34px">Captivate</span></div>
    <div class="r"><span class="tok">2xl · 36</span><span class="ex" style="font-size:28px">Captivate</span></div>
    <div class="r"><span class="tok">xl · 28</span><span class="ex" style="font-size:23px">Captivate</span></div>
    <div class="r"><span class="tok">lg · 22</span><span class="ex" style="font-size:19px">Captivate</span></div>
    <div class="r"><span class="tok">base · 16</span><span class="ex" style="font-size:16px;font-family:var(--font-body);font-weight:500">Captivate the room</span></div>
  </div>
</div></body></html>
