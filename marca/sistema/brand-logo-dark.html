<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="card.css">
<style>
  .card{ display:flex; align-items:center; justify-content:center; background:var(--maroon-800); }
  .lock { display:flex; flex-direction:column; align-items:center; gap:4px; }
  .crown { width:150px; color:var(--orange-500); margin-bottom:12px; }
  .wm { font-family:var(--font-logo); font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--cream-200); font-size:31px; line-height:1; white-space:nowrap; }
  .tg { font-family:var(--font-script); font-style:italic; font-weight:500; color:var(--cream-200); font-size:24px; margin-top:2px; }
</style></head>
<body><div class="card">
  <div class="lock">
    <svg class="crown" viewBox="0 0 240 60" fill="currentColor"><circle cx="30" cy="30" r="5"/><circle cx="68" cy="30" r="8.5"/><path d="M120 4 L128 22 L146 30 L128 38 L120 56 L112 38 L94 30 L112 22 Z"/><circle cx="172" cy="30" r="8.5"/><circle cx="210" cy="30" r="5"/></svg>
    <div class="wm">Spelbound Marketing</div>
    <div class="tg">Strategy that captivates</div>
  </div>
</div></body></html>
