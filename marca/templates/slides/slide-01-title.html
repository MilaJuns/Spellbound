<!DOCTYPE html>
<!-- @dsCard group="Slides" name="Slide — Title" subtitle="Logo lockup cover" viewport="1280x720" --><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="slide.css">
<style>
  .photo { position:absolute; right:0; top:0; bottom:0; width:42%; }
  .photo img { width:100%; height:100%; object-fit:cover; object-position:50% 30%; display:block; }
  .photo .fade { position:absolute; inset:0; background:linear-gradient(to left, rgba(81,0,0,0) 50%, var(--maroon-800)); }
  .lock { position:absolute; left:0; top:0; bottom:0; width:62%; display:flex; flex-direction:column; align-items:flex-start; justify-content:center; padding:0 0 0 92px; }
  .crown { width: 260px; color: var(--orange-500); margin-bottom: 26px; }
  .title-wm { font-family: var(--font-logo); font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--cream-200); font-size: 58px; line-height: 1; white-space: nowrap; }
  .title-tag { font-family: var(--font-script); font-style: italic; font-weight: 500; color: var(--cream-200); font-size: 38px; margin-top: 12px; }
</style></head>
<body>
<div class="slide" data-screen-label="Title">
  <div class="photo">
    <img src="../assets/photos/founder-headshot.jpeg" alt="Spelbound lead strategist">
    <div class="fade"></div>
  </div>
  <div class="lock">
    <svg class="crown" viewBox="0 0 240 60" fill="currentColor"><circle cx="30" cy="30" r="5"/><circle cx="68" cy="30" r="8.5"/><path d="M120 4 L128 22 L146 30 L128 38 L120 56 L112 38 L94 30 L112 22 Z"/><circle cx="172" cy="30" r="8.5"/><circle cx="210" cy="30" r="5"/></svg>
    <div class="title-wm">Spelbound Marketing</div>
    <div class="title-tag">Strategy that captivates</div>
  </div>
</div>
</body></html>
