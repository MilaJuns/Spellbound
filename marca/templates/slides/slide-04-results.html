<!DOCTYPE html>
<!-- @dsCard group="Slides" name="Slide — Results" subtitle="Big-number stat band" viewport="1280x720" --><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="slide.css">
<style>
  .pad { justify-content: center; }
  .s-eyebrow { margin-bottom: 50px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
  .stat .n { font-family: var(--font-display); font-weight: 700; font-size: 96px; line-height: 1; color: var(--orange-500); }
  .stat .l { font-family: var(--font-body); font-size: 19px; line-height: 1.45; color: var(--cream-300); margin-top: 16px; max-width: 270px; }
  .rule { height: 1px; background: var(--maroon-600); margin: 6px 0 50px; }
</style></head>
<body>
<div class="slide" data-screen-label="Results">
  <div class="pad">
    <div class="s-eyebrow">Results that move the room</div>
    <div class="rule"></div>
    <div class="stats">
      <div class="stat"><div class="n">3.4×</div><div class="l">average return on ad spend</div></div>
      <div class="stat"><div class="n">+128%</div><div class="l">qualified pipeline in six months</div></div>
      <div class="stat"><div class="n">40M+</div><div class="l">earned impressions, last campaign</div></div>
    </div>
  </div>
  <div class="s-foot">
    <span class="wm"><svg viewBox="0 0 100 100" fill="currentColor"><path d="M50 2 L58 42 L98 50 L58 58 L50 98 L42 58 L2 50 L42 42 Z"/></svg>Spelbound</span>
    <span>Strategy that captivates</span>
  </div>
</div>
</body></html>
