<!DOCTYPE html>
<!-- @dsCard group="Slides" name="Slide — Closing" subtitle="CTA + contact" viewport="1280x720" --><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="slide.css">
<style>
  .pad { justify-content: center; }
  .s-h1 { font-size: 62px; }
  .s-h1 .s-script { color: var(--orange-500); }
  .lead { font-size: 24px; color: var(--cream-300); margin: 22px 0 40px; max-width: 620px; line-height: 1.5; }
  .cta { display: inline-flex; align-items: center; gap: 11px; background: var(--orange-500); color: var(--cream-50); font-family: var(--font-body); font-weight: 600; font-size: 20px; padding: 18px 36px; border-radius: var(--radius-pill); box-shadow: var(--shadow-accent); width: fit-content; }
  .cta svg { width: 20px; height: 20px; }
  .contact { display: flex; gap: 40px; margin-top: 54px; font-family: var(--font-body); font-size: 18px; color: var(--cream-200); }
  .contact b { color: var(--orange-400); font-weight: 600; display: block; font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 5px; }
  .deco { position: absolute; color: var(--maroon-700); }
</style></head>
<body>
<div class="slide" data-screen-label="Closing">
  <svg class="deco" style="width:280px;top:-60px;right:-40px" viewBox="0 0 100 100" fill="currentColor"><path d="M50 2 L58 42 L98 50 L58 58 L50 98 L42 58 L2 50 L42 42 Z"/></svg>
  <div class="pad">
    <h2 class="s-h1">Let's turn effort<br>into <span class="s-script">results</span>.</h2>
    <p class="lead">Book a free 30-minute strategy call. No pitch deck — just a clear next step.</p>
    <span class="cta">Book a strategy call <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></span>
    <div class="contact">
      <div><b>Email</b>hello@spelbound.co</div>
      <div><b>Call</b>+1 (555) 010-2025</div>
      <div><b>Social</b>@spelbound</div>
    </div>
  </div>
</div>
</body></html>
